name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Must already exist on the remote.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag matches Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - id: version
        name: Check tag against Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          cargo_version=$(grep -E '^version *=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$version" != "$cargo_version" ]; then
            echo "::error::Tag $tag (=$version) does not match Cargo.toml version $cargo_version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            target: aarch64-apple-darwin
            runner: macos-14
          - name: macos-x86_64
            target: x86_64-apple-darwin
            runner: macos-13
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"
          archive="rspass-${version}-${{ matrix.name }}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${archive}" -C "target/${{ matrix.target }}/release" rspass
          shasum -a 256 "dist/${archive}" | awk '{print $1}' > "dist/${archive}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
